{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Appreciation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing:border-box; }
        body { margin:0; min-height:100vh; background:#eef2f4; font-family:"Poppins", Arial, sans-serif; }
        .page { width:min(1200px, calc(100% - 32px)); margin:24px auto; }
        .slide { position:relative; min-height:675px; overflow:hidden; color:#fff; background:url("{% static 'decks/img/image(1).png' %}") center/cover no-repeat; box-shadow:0 2px 10px rgba(0,0,0,.24); padding:46px 46px 48px; }
        .content-card { width:min(610px, 52%); min-height:580px; border:1px solid rgba(255,255,255,.45); border-radius:22px; padding:28px; background:rgba(217,230,232,.34); box-shadow:inset 0 0 0 1px rgba(255,255,255,.12); }
        .content-card p { margin:0 0 24px; font-size:22px; line-height:1.18; font-weight:800; white-space:pre-line; }
        .author { margin-top:18px; font-size:19px; line-height:1.25; font-weight:700; color:rgba(255,255,255,.9); }
        .person { position:absolute; right:70px; top:110px; width:330px; text-align:center; }
        .person img { width:100%; height:430px; object-fit:contain; object-position:center bottom; display:block; filter:drop-shadow(0 16px 20px rgba(0,0,0,.22)); }
        .person-info { margin:-11px auto 0; width:100%; border-radius:8px; padding:8px 18px; color:#082a74; background:#fff; }
        .person-info strong,.person-info span { display:block; }
        .person-info strong { font-size:25px; line-height:1.08; font-weight:900; }
        .person-info span { margin-top:4px; font-size:20px; line-height:1.15; font-weight:500; }
        .message-icon { position:absolute; left:50%; bottom:18px; width:102px; height:102px; object-fit:contain; filter:drop-shadow(0 4px 12px rgba(0,0,0,.25)); transform:translateX(-50%); }
        .dashboard-link { display:inline-block; margin:18px 0 0; color:#0b3954; font-weight:800; }
        @media (max-width:1000px) {
            .slide { padding:28px 22px; display:grid; gap:24px; }
            .content-card { width:100%; min-height:0; }
            .content-card p { font-size:18px; }
            .person { position:relative; right:auto; top:auto; width:min(330px, 100%); margin:0 auto; }
            .person img { height:360px; }
            .person-info { width:100%; }
            .message-icon { position:relative; left:auto; bottom:auto; margin:0 auto; transform:none; }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="slide">
            {% if special_page %}
                <div class="content-card">
                    <p>{{ special_page.content }}</p>
                    {% if special_page.author %}
                        <div class="author">- {{ special_page.author }} -</div>
                    {% endif %}
                </div>
                <div class="person">
                    <img src="{{ special_page.image.url }}" alt="{{ special_page.name }}">
                    <div class="person-info">
                        <strong>{{ special_page.name }}</strong>
                        <span>{{ special_page.designation }}</span>
                    </div>
                </div>
                <img class="message-icon" src="{% static 'decks/img/3d-chat-bubble-icon-blue-circle 1.png' %}" alt="">
            {% endif %}
        </section>
        <a class="dashboard-link" href="{% url 'special_appreciation_dashboard' %}">Open dashboard</a>
    </main>
</body>
</html>
